    <ellipse cx="0" cy="-60" rx="22" ry="44" transform="rotate(144)"/>
    <ellipse cx="0" cy="-60" rx="22" ry="44" transform="rotate(216)"/>
    <ellipse cx="0" cy="-60" rx="22" ry="44" transform="rotate(288)"/>
  </g>
  <circle cx="256" cy="240" r="18" fill="#f85e9f"/>
