<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anki Web - 间隔重复记忆</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['-apple-system','BlinkMacSystemFont','"Segoe UI"','"PingFang SC"','"Hiragino Sans GB"','"Microsoft YaHei"','"Helvetica Neue"','Helvetica','Arial','sans-serif'],
      },
    },
  },
}
</script>
<style>
  .card-flip { perspective: 800px; }
  .card-flip-inner { transition: transform 0.5s; transform-style: preserve-3d; }
  .card-flip.flipped .card-flip-inner { transform: rotateY(180deg); }
  .card-front, .card-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .card-back { transform: rotateY(180deg); }
  .toast { animation: slideDown 0.3s ease; }
  @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-overlay { background: rgba(0,0,0,0.4); }
  .progress-bar { transition: width 0.3s ease; }
  #reviewFrontContent img, #reviewBackContent img,
  #previewFront img, #previewBack img { cursor: pointer; }
  #ctxMenu { z-index: 9999; }
</style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

<!-- Toast -->
<div id="toast" class="fixed top-4 right-4 z-50 hidden"></div>

<!-- Lightbox for image zoom -->
<div id="lightbox" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 hidden cursor-pointer" onclick="closeLightbox()">
  <div class="relative max-w-[90vw] max-h-[90vh] flex items-center justify-center">
    <img id="lightboxImg" class="max-w-full max-h-[90vh] object-contain rounded-lg cursor-default" onclick="event.stopPropagation()">
    <button class="absolute -top-3 -right-3 w-8 h-8 bg-white rounded-full shadow-lg text-gray-600 hover:text-gray-900 flex items-center justify-center text-lg font-bold" onclick="closeLightbox()">×</button>
  </div>
</div>

<!-- Context menu -->
<div id="ctxMenu" class="fixed z-50 hidden bg-white rounded-lg shadow-xl border border-gray-200 py-1 w-36" style="min-width:120px">
  <button class="w-full px-4 py-2 text-left text-sm text-red-600 hover:bg-red-50 transition-colors flex items-center gap-2" onclick="ctxAction()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
    清空卡片
  </button>
</div>

<!-- Header -->
<header class="bg-white shadow-sm sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white text-lg">🃟</div>
      <h1 class="text-lg font-bold text-gray-800">Anki Web</h1>
    </div>
    <nav class="flex gap-1 text-sm">
      <a href="#dashboard" class="nav-link px-3 py-1.5 rounded-lg text-gray-500 hover:text-blue-600 hover:bg-blue-50 transition-colors" data-route="dashboard">仪表盘</a>
      <a href="#add" class="nav-link px-3 py-1.5 rounded-lg text-gray-500 hover:text-blue-600 hover:bg-blue-50 transition-colors" data-route="add">添加</a>
      <a href="#browse" class="nav-link px-3 py-1.5 rounded-lg text-gray-500 hover:text-blue-600 hover:bg-blue-50 transition-colors" data-route="browse">浏览</a>
      <a href="#stats" class="nav-link px-3 py-1.5 rounded-lg text-gray-500 hover:text-blue-600 hover:bg-blue-50 transition-colors" data-route="stats">统计</a>
    </nav>
  </div>
</header>

<!-- Main content -->
<main id="app" class="max-w-6xl mx-auto p-4 sm:p-6"></main>

<!-- Modal container -->
<div id="modal" class="fixed inset-0 z-40 flex items-center justify-center hidden">
  <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
  <div id="modalContent" class="bg-white rounded-2xl shadow-xl p-6 max-w-md mx-4 relative z-10 max-h-[85vh] overflow-y-auto"></div>
</div>

<!-- Confirm modal -->
<div id="confirmModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="modal-overlay absolute inset-0" onclick="closeConfirm()"></div>
  <div class="bg-white rounded-2xl shadow-xl p-6 max-w-sm mx-4 relative z-10">
    <p id="confirmMsg" class="text-gray-700 mb-5"></p>
    <div class="flex gap-3 justify-end">
      <button onclick="closeConfirm()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
      <button id="confirmBtn" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">确认</button>
    </div>
  </div>
</div>

<input type="file" id="imageInput" accept="image/*" class="hidden">

<script src="js/db.js"></script>
<script src="js/scheduler.js"></script>
<script>
'use strict';

// ===== Helpers =====
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

function genId() { return crypto.randomUUID?.() ?? Date.now().toString(36)+Math.random().toString(36).slice(2,11); }

function escapeHTML(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ===== Image & HTML helpers =====
function imageToDataURL(file) {
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.readAsDataURL(file);
  });
}

function insertAtCursor(el, text) {
  const start = el.selectionStart, end = el.selectionEnd;
  el.value = el.value.substring(0, start) + text + el.value.substring(end);
  el.selectionStart = el.selectionEnd = start + text.length;
  el.focus();
  el.dispatchEvent(new Event('input', { bubbles: true }));
}

function safeHTML(html) {
  return html
    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
    .replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, '')
    .replace(/<iframe\b[^<]*(?:(?!<\/iframe>)<[^<]*)*<\/iframe>/gi, '')
    .replace(/\bon\w+\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]+)/gi, '')
    .replace(/href\s*=\s*(?:"javascript:[^"]*"|'javascript:[^']*')/gi, 'href="#"');
}

function stripHTML(html) {
  const d = document.createElement('div');
  d.innerHTML = html.replace(/<img\b[^>]*>/gi, '[图片]');
  return d.textContent;
}

function showToast(msg, type='info') {
  const el=$('#toast'), colors={success:'bg-green-500',error:'bg-red-500',info:'bg-gray-700'};
  el.className=`toast fixed top-4 right-4 z-50 ${colors[type]} text-white px-4 py-2 rounded-lg shadow-lg text-sm`;
  el.textContent=msg; el.classList.remove('hidden');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.add('hidden'),2500);
}

let confirmCb=null;
function showConfirm(msg,cb){$('#confirmMsg').textContent=msg;$('#confirmModal').classList.remove('hidden');confirmCb=cb;$('#confirmBtn').onclick=()=>{closeConfirm();cb();};}
function closeConfirm(){$('#confirmModal').classList.add('hidden');confirmCb=null;}

function showModal(html){$('#modalContent').innerHTML=html;$('#modal').classList.remove('hidden');}
function closeModal(){$('#modal').classList.add('hidden');}

function downloadBlob(blob,filename){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}

function formatDate(ts){const d=new Date(ts);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function formatTime(ts){const d=new Date(ts);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

// ===== Navigation =====
function navigate() {
  const hash = location.hash || '#dashboard';
  const route = hash.split('/')[0].replace('#','');
  $$('.nav-link').forEach(l=>{l.classList.toggle('text-blue-600',l.dataset.route===route);l.classList.toggle('bg-blue-50',l.dataset.route===route);});
  switch(route) {
    case 'dashboard': renderDashboard(); break;
    case 'deck': renderReview(hash); break;
    case 'add': renderAdd(); break;
    case 'browse': renderBrowse(); break;
    case 'stats': renderStats(); break;
    default: renderDashboard();
  }
}
window.addEventListener('hashchange', navigate);

// ===== Dashboard =====
async function renderDashboard() {
  const decks = await Deck.getAll();
  let dueTotal=0, html='';
  for (const d of decks) {
    const counts = await Card.countByDeck(d.id);
    dueTotal += counts.new + counts.learn + counts.review;
    html += `
      <div class="deck-card bg-white rounded-xl shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer" data-deck-id="${d.id}" onclick="location.hash='#deck/${d.id}'" oncontextmenu="event.preventDefault();showCtxMenu(event, ${d.id})">
        <div class="flex items-center justify-between">
          <div>
            <h3 class="font-medium text-gray-800">${escapeHTML(d.name)}</h3>
            <p class="text-xs text-gray-400 mt-0.5">共 ${counts.total} 张卡片</p>
          </div>
          <div class="flex gap-2">
            ${counts.new ? `<span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full">新 ${counts.new}</span>` : ''}
            ${counts.learn ? `<span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">学 ${counts.learn}</span>` : ''}
            ${counts.review ? `<span class="text-xs bg-green-100 text-green-600 px-2 py-1 rounded-full">复 ${counts.review}</span>` : ''}
            ${!counts.new&&!counts.learn&&!counts.review ? `<span class="text-xs bg-gray-100 text-gray-400 px-2 py-1 rounded-full">完成</span>` : ''}
          </div>
        </div>
        ${counts.new+counts.learn+counts.review>0 ? `<div class="mt-3 bg-gray-100 rounded-full h-1.5"><div class="progress-bar bg-blue-500 h-1.5 rounded-full" style="width:${Math.max(5,((counts.new+counts.learn+counts.review)/Math.max(counts.total,1))*100)}%"></div></div>` : ''}
      </div>`;
  }
  if (decks.length===0) html=`<div class="text-center py-16 text-gray-400"><div class="text-5xl mb-3">📚</div><p class="text-sm">还没有卡组，点击下方按钮创建</p></div>`;

  $('#app').innerHTML = `
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-xl font-bold text-gray-800">仪表盘</h2>
      <button onclick="showNewDeckModal()" class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600 transition-colors">+ 新建卡组</button>
    </div>
    ${dueTotal>0 ? `<div class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-xl flex items-center justify-between">
      <p class="text-sm text-blue-700 font-medium">今天有 <span class="font-bold">${dueTotal}</span> 张卡片待复习</p>
      ${decks.length===1 ? `<button onclick="location.hash='#deck/${decks[0].id}'" class="px-4 py-1.5 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600 transition-colors">开始学习</button>` : ''}
    </div>` : (decks.length>0 ? `<div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-xl text-sm text-green-700 text-center font-medium">🎉 今天的任务全部完成！</div>` : '')}
    <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">${html}</div>`;
}

function showNewDeckModal() {
  showModal(`
    <h3 class="text-lg font-bold mb-4">新建卡组</h3>
    <input id="newDeckName" placeholder="输入卡组名称" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm mb-4" onkeydown="if(event.key==='Enter')createDeck()">
    <button onclick="createDeck()" class="w-full py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600 transition-colors">创建</button>`);
  setTimeout(()=>$('#newDeckName')?.focus(), 100);
}
async function createDeck() {
  const name = $('#newDeckName').value.trim();
  if (!name) { showToast('请输入卡组名称', 'error'); return; }
  try { await Deck.create(name); closeModal(); showToast('卡组已创建', 'success'); renderDashboard(); }
  catch(e) { showToast('创建失败: ' + e.message, 'error'); }
}
window.createDeck = createDeck;
window.showNewDeckModal = showNewDeckModal;

// ===== Review =====
let reviewState = { cards: [], idx: 0, did: 0, showingBack: false, states: null };

async function renderReview(hash) {
  const did = parseInt(hash.split('/')[1]) || 1;
  const cards = await Card.getDueCards(did);
  if (cards.length === 0) {
    const deck = await Deck.get(did);
    $('#app').innerHTML = `
      <div class="text-center py-16">
        <div class="text-6xl mb-4">🎉</div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">${escapeHTML(deck?.name||'')} — 全部完成！</h2>
        <p class="text-gray-400 mb-6">当前没有待复习的卡片</p>
        <div class="flex gap-3 justify-center">
          <button onclick="location.hash='#add'" class="px-5 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600 transition-colors">添加卡片</button>
          <button onclick="location.hash='#dashboard'" class="px-5 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm hover:bg-gray-200 transition-colors">返回</button>
        </div>
      </div>`;
    return;
  }
  // Sort: learning first, then new, then review
  cards.sort((a,b)=> {
    if (a.type===1&&b.type!==1) return -1;
    if (b.type===1&&a.type!==1) return 1;
    if (a.type===0&&b.type!==0) return -1;
    if (b.type===0&&a.type!==0) return 1;
    return 0;
  });
  reviewState = { cards, idx: 0, did, showingBack: false, states: null };
  renderReviewCard();
}

function renderReviewCard() {
  if (reviewState.idx >= reviewState.cards.length) {
    renderReview(`#deck/${reviewState.did}`);
    return;
  }
  const card = reviewState.cards[reviewState.idx];
  const states = Scheduler.getStates(card);
  reviewState.states = states;
  reviewState.showingBack = false;

  Note.get(card.nid).then(note => {
    const front = note?.fields[0] || '(空)';
    const back = note?.fields[1] || '(空)';
    const deckName = ''; // Will be filled by deck name
    Deck.get(card.did).then(d => {
      const dueInfo = card.type === 0 ? '新卡片' :
        card.type === 1 ? `学习中 · 还剩 ${card.left} 步` :
        `复习 · 间隔 ${card.ivl} 天 · 难度 ${(card.factor/1000).toFixed(1)}x`;

      $('#app').innerHTML = `
        <div class="max-w-xl mx-auto">
          <div class="text-center text-sm text-gray-400 mb-2">${escapeHTML(d?.name||'')} · ${dueInfo} · ${reviewState.idx+1}/${reviewState.cards.length}</div>
          <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="card-flip ${reviewState.showingBack?'flipped':''}" id="reviewCard" onclick="flipCard()">
              <div class="card-flip-inner relative" style="min-height:360px">
                <div class="card-front absolute inset-0 bg-gradient-to-br from-blue-50 to-blue-100 p-8 overflow-y-auto">
                  <div class="flex flex-col items-center justify-center min-h-full w-full">
                    <p class="text-xs text-blue-400 mb-3 uppercase tracking-wide">问题</p>
                    <p id="reviewFrontContent" class="text-2xl sm:text-3xl font-medium text-gray-800 whitespace-pre-wrap"></p>
                  </div>
                </div>
                <div class="card-back absolute inset-0 bg-gradient-to-br from-green-50 to-green-100 p-8 overflow-y-auto">
                  <div class="flex flex-col items-center justify-center min-h-full w-full">
                    <p class="text-xs text-green-400 mb-3 uppercase tracking-wide">答案</p>
                    <p id="reviewBackContent" class="text-2xl sm:text-3xl font-medium text-gray-800 whitespace-pre-wrap"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="flex justify-center mt-4">
            <p class="text-xs text-gray-400">点击卡片翻转</p>
          </div>
          <div id="answerButtons" class="grid grid-cols-4 gap-2 mt-4 ${reviewState.showingBack?'':'hidden'}">
            <button onclick="answerCard('again')" class="py-3 px-2 bg-red-500 text-white rounded-xl text-sm font-medium hover:bg-red-600 transition-colors">
              忘记<div class="text-xs opacity-70">${Scheduler.formatInterval(states.again)}</div>
            </button>
            <button onclick="answerCard('hard')" class="py-3 px-2 bg-orange-400 text-white rounded-xl text-sm font-medium hover:bg-orange-500 transition-colors">
              困难<div class="text-xs opacity-70">${Scheduler.formatInterval(states.hard)}</div>
            </button>
            <button onclick="answerCard('good')" class="py-3 px-2 bg-blue-500 text-white rounded-xl text-sm font-medium hover:bg-blue-600 transition-colors">
              良好<div class="text-xs opacity-70">${Scheduler.formatInterval(states.good)}</div>
            </button>
            <button onclick="answerCard('easy')" class="py-3 px-2 bg-green-500 text-white rounded-xl text-sm font-medium hover:bg-green-600 transition-colors">
              简单<div class="text-xs opacity-70">${Scheduler.formatInterval(states.easy)}</div>
            </button>
          </div>
          <div class="flex justify-center mt-3 gap-3">
            <button onclick="editCard(${card.id})" class="text-xs text-gray-400 hover:text-blue-500 transition-colors">编辑</button>
            <button onclick="deleteCard(${card.id})" class="text-xs text-gray-400 hover:text-red-500 transition-colors">删除</button>
            <button onclick="location.hash='#dashboard'" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">退出</button>
          </div>
        </div>`;
        $('#reviewFrontContent').innerHTML = safeHTML(front);
        $('#reviewBackContent').innerHTML = safeHTML(back);
    });
  });
}

window.flipCard = function() {
  reviewState.showingBack = true;
  const el = $('#reviewCard');
  if (el) el.classList.toggle('flipped');
  const btn = $('#answerButtons');
  if (btn) btn.classList.remove('hidden');
};

window.answerCard = async function(rating) {
  const card = reviewState.cards[reviewState.idx];
  const states = reviewState.states;
  const updated = Scheduler.applyRating(card, rating, states);
  await Card.update(updated);
  await Revlog.add(card.id, rating, 0, updated.ivl, updated.factor, updated.reps, updated.lapses);
  reviewState.idx++;
  renderReviewCard();
};

window.editCard = function(cid) {
  Card.get(cid).then(card => {
    Note.get(card.nid).then(note => {
      showModal(`
        <h3 class="text-lg font-bold mb-4">编辑卡片</h3>
        <label class="block text-xs text-gray-500 mb-1">正面</label>
        <div class="flex gap-1 mb-3">
          <textarea id="editFront" rows="2" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 resize-none">${escapeHTML(note.fields[0]||'')}</textarea>
          <button type="button" class="img-btn self-end px-2 py-2 border border-gray-200 rounded-lg text-gray-400 hover:text-blue-500 hover:border-blue-300 transition-colors shrink-0" title="插入图片" data-target="editFront">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </button>
        </div>
        <label class="block text-xs text-gray-500 mb-1">背面</label>
        <div class="flex gap-1 mb-3">
          <textarea id="editBack" rows="2" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 resize-none">${escapeHTML(note.fields[1]||'')}</textarea>
          <button type="button" class="img-btn self-end px-2 py-2 border border-gray-200 rounded-lg text-gray-400 hover:text-blue-500 hover:border-blue-300 transition-colors shrink-0" title="插入图片" data-target="editBack">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </button>
        </div>
        <label class="block text-xs text-gray-500 mb-1">标签（空格分隔）</label>
        <input id="editTags" value="${escapeHTML((note.tags||[]).join(' '))}" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm mb-4">
        <div class="flex gap-2">
          <button onclick="saveEdit(${card.nid})" class="flex-1 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600 transition-colors">保存</button>
          <button onclick="closeModal()" class="flex-1 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm hover:bg-gray-200 transition-colors">取消</button>
        </div>`);
    });
  });
};
window.saveEdit = async function(nid) {
  const note = await Note.get(nid);
  note.fields[0] = $('#editFront').value;
  note.fields[1] = $('#editBack').value;
  note.tags = $('#editTags').value.trim().split(/\s+/).filter(Boolean);
  await Note.update(note);
  closeModal();
  showToast('卡片已更新', 'success');
  if (location.hash.startsWith('#deck/')) renderReviewCard();
  else if (location.hash.startsWith('#browse')) renderBrowse();
};

window.deleteCard = async function(cid) {
  showConfirm('确定要删除这张卡片吗？', async () => {
    const card = await Card.get(cid);
    await Card.removeByNid(card.nid);
    await Note.remove(card.nid);
    reviewState.cards.splice(reviewState.idx, 1);
    if (reviewState.idx >= reviewState.cards.length) {
      renderReview(`#deck/${reviewState.did}`);
    } else {
      renderReviewCard();
    }
    showToast('卡片已删除', 'info');
  });
};

// ===== Add Cards =====
async function renderAdd() {
  const decks = await Deck.getAll();
  if (decks.length === 0) { await ensureDefaultDeck(); }
  const d = await Deck.getAll();
  const deckOpts = d.map(dk=>`<option value="${dk.id}">${escapeHTML(dk.name)}</option>`).join('');

  $('#app').innerHTML = `

function updatePreview() {

  if (!front && !back) {
    $('#previewPlaceholder').classList.remove('hidden');

window.addSingleCard = async function(e) {
  e.preventDefault();
  const form = e.target;
  const front = form.front.value.trim();
  const back = form.back.value.trim();
  if (!front || !back) { showToast('正面和背面为必填项', 'error'); return; }
  const tags = form.tags.value.trim().split(/\s+/).filter(Boolean);
  const did = parseInt(form.deck.value) || 1;
  await createNote(front, back, tags, did);
  form.reset();
  form.front.focus();

  loadRecentCards();
  showToast('卡片已添加', 'success');
};

async function createNote(front, back, tags, did) {
  const nid = await Note.create([front, back], tags, 0);
  await Card.create(nid, did, 0);
  return nid;
}

// Batch parsing
function detectDelim(text) {
  const lines = text.split('\n').filter(l=>l.trim()).slice(0,10);
  if (!lines.length) return 'none';
  const delims = [',','\t','|'];
  let best = {d:'none',c:0};
  for (const d of delims) {
    let total = 0;
    for (const l of lines) total += (l.match(new RegExp('\\'+d,'g'))||[]).length;
    if (total>best.c) best={d,c:total};
  }
  return best.c>0 ? best.d : 'none';
}

window.previewBatch = function() {
  const text = $('#batchText')?.value||'';
  const delim = $('#delimiter')?.value||'auto';
  if (!text.trim()) { $('#batchPreview')?.classList.add('hidden'); return; }
  const d = delim==='auto' ? detectDelim(text) : delim;
  const parsed = [];
  for (const line of text.split('\n').filter(l=>l.trim())) {
    const t = line.trim();
    if (d==='none') parsed.push({f:t,b:''});
    else if (d==='\t') { const p=t.split('\t'); parsed.push({f:p[0]?.trim()||'',b:p.slice(1).join('\t').trim()}); }
    else parsed.push({f:t.split(d)[0]?.trim()||'',b:t.split(d).slice(1).join(d).trim()});
  }
  const pr = $('#batchPreview'), pl = $('#batchPreviewList'), bc = $('#batchCount');
  if (!pr||!pl||!bc) return;
  pr.classList.remove('hidden');
  bc.textContent = parsed.length;
  pl.innerHTML = parsed.slice(0,30).map((p,i)=>`<div class="flex gap-2 py-0.5"><span class="text-gray-400 w-5">${i+1}.</span><span class="text-gray-700 truncate flex-1">${escapeHTML(p.f)}</span><span class="text-gray-400">→</span><span class="text-gray-500 truncate flex-1">${escapeHTML(p.b||'(空)')}</span></div>`).join('');
};

window.addBatchCards = async function() {
  const text = $('#batchText')?.value||'';
  if (!text.trim()) { showToast('请粘贴内容后再生成','error'); return; }
  const delim = $('#delimiter')?.value||'auto';
  const tags = $('#batchTags')?.value.trim().split(/\s+/).filter(Boolean)||[];
  const did = parseInt($('#batchDeck')?.value)||1;
  const d = delim==='auto' ? detectDelim(text) : delim;
  let added=0;
  for (const line of text.split('\n').filter(l=>l.trim())) {
    const t=line.trim();
    let f='',b='';
    if (d==='none') f=t;
    else if (d==='\t') { const p=t.split('\t'); f=p[0]?.trim()||''; b=p.slice(1).join('\t').trim(); }
    else { f=t.split(d)[0]?.trim()||''; b=t.split(d).slice(1).join(d).trim(); }
    if (f.trim()) { await createNote(f,b,tags,did); added++; }
  }
  showToast(`已批量添加 ${added} 张卡片`,'success');
  $('#batchText').value='';
  $('#batchPreview').classList.add('hidden');
  loadRecentCards();
};

function escapeTXTField(field) {
  const s = String(field ?? '');
  if (/[\t\n\r"]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

window.exportCards = async function() {
  const cards = await Card.getAll();
  if (!cards.length) { showToast('没有可导出的卡片', 'error'); return; }
  const lines = ['#separator:tab', '#html:true'];
  for (const c of cards) {
    const note = await Note.get(c.nid);
    const fields = note?.fields||['',''];
    const deck = await Deck.get(c.did);
    lines.push([fields[0]||'', fields[1]||'', (note?.tags||[]).join(' '), deck?.name||''].map(escapeTXTField).join('\t'));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/tab-separated-values;charset=utf-8;' });
  downloadBlob(blob, 'anki-cards.txt');
  showToast(`已导出 ${cards.length} 张卡片为 Anki 格式`, 'success');
};

// ===== Import =====
function parseTXTLine(line) {
  const fields = [];
  let i = 0;
  while (i < line.length) {
    if (line[i] === '\t') { fields.push(''); i++; continue; }
    if (line[i] === '"') {
      let val = ''; i++; // skip opening quote
      while (i < line.length) {
        if (line[i] === '"') {
          if (i + 1 < line.length && line[i + 1] === '"') {
            val += '"'; i += 2; // escaped quote
          } else {
            i++; break; // closing quote
          }
        } else {
          val += line[i]; i++;
        }
      }
      fields.push(val);
      if (i < line.length && line[i] === '\t') i++; // skip separator after closing quote
    } else {
      let val = '';
      while (i < line.length && line[i] !== '\t') { val += line[i]; i++; }
      fields.push(val);
      if (i < line.length && line[i] === '\t') i++;
    }
  }
  // Handle trailing empty field (line ends with tab)
  if (line.endsWith('\t')) fields.push('');
  return fields;
}

async function parseImportFile(text) {
  const lines = text.split(/\r?\n/).filter(l => {
    const t = l.trim();
    return t && !t.startsWith('#');
  });
  const cards = [];
  for (const line of lines) {
    const fields = parseTXTLine(line);
    if (fields.length >= 2 && fields[0].trim()) {
      cards.push({
        front: fields[0].trim(),
        back: (fields[1] || '').trim(),
        tags: fields.length >= 3 ? fields[2].trim().split(/[\s;；]+/).filter(Boolean) : [],
        deck: fields.length >= 4 ? fields[3].trim() : '',
      });
    }
  }
  return cards;
}

      <div class="mb-3 space-y-1 max-h-48 overflow-y-auto">
        <label class="flex items-center gap-2 px-2 py-1.5 bg-gray-50 rounded-lg text-sm cursor-pointer hover:bg-gray-100 transition-colors">
          <input type="checkbox" id="selectAllDecks" checked onchange="toggleAllDecks(this.checked)">
          <span class="font-medium text-gray-700">全选 / 取消全选</span>
        </label>
        ${deckNames.map((name, idx) => {
          const isUnnamed = !name;
          const label = isUnnamed ? '(无分组)' : name;
          const matchedDeck = decks.find(d => d.name === name);
          return `
          <div class="flex items-center gap-2 px-2 py-1.5 rounded-lg text-sm hover:bg-gray-50 transition-colors import-deck-item">
            <input type="checkbox" class="deck-checkbox" checked onchange="updateImportCount()">
            <span class="flex-1 ${isUnnamed ? 'text-gray-400' : ''}">${escapeHTML(label)}</span>
            <span class="text-xs text-gray-400">${deckGroups[name].length} 张</span>
            <select class="import-deck-select ml-2 px-2 py-0.5 border border-gray-200 rounded text-xs bg-white" data-group-idx="${idx}">
              ${decks.map(d => `<option value="${d.id}" ${matchedDeck?.id === d.id ? 'selected' : ''}>${escapeHTML(d.name)}</option>`).join('')}
            </select>
          </div>`;
        }).join('')}
      </div>
      <p id="importSelectedCount" class="text-xs text-gray-400 mb-4"></p>
      <div class="flex gap-2">
        <button onclick="doImport()" class="flex-1 py-2 bg-green-500 text-white rounded-lg text-sm hover:bg-green-600 transition-colors">确认导入</button>
        <button onclick="closeModal()" class="flex-1 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm hover:bg-gray-200 transition-colors">取消</button>
      </div>`);

    window._importCards = cards;
    window._importDeckGroups = deckGroups;
    window._importDeckNames = deckNames;
    updateImportCount();
  } catch (e) {
    showToast('文件读取失败: ' + (e.message || String(e)), 'error');
  }
  event.target.value = '';
};

window.toggleAllDecks = function(checked) {
  $$('.deck-checkbox').forEach(cb => cb.checked = checked);
  updateImportCount();
};

window.updateImportCount = function() {
  const total = window._importCards?.length || 0;
  let selected = 0;
  if (window._importDeckGroups) {
    const names = window._importDeckNames || Object.keys(window._importDeckGroups);
    names.forEach((name, idx) => {
      const item = document.querySelector(`.import-deck-item:nth-child(${idx + 2}) .deck-checkbox`);
      if (item && item.checked) selected += window._importDeckGroups[name].length;
    });
  } else {
    selected = total;
  }
  const el = $('#importSelectedCount');
  if (el) el.textContent = `已选 ${selected} / ${total} 张卡片`;
};

window.doImport = async function() {
  const cards = window._importCards;
  if (!cards || !cards.length) return;
  // Get selected groups and their target deck ids
  const groups = window._importDeckGroups;
  const names = window._importDeckNames || Object.keys(groups || {});
  const selectedGroups = [];
  names.forEach((name, idx) => {
    const item = document.querySelector(`.import-deck-item:nth-child(${idx + 2})`);
    const cb = item?.querySelector('.deck-checkbox');
    if (cb && cb.checked) {
      const sel = item?.querySelector('.import-deck-select');
      selectedGroups.push({ name, targetDid: sel ? parseInt(sel.value) : null });
    }
  });
  if (!selectedGroups.length) { showToast('请至少选择一个分组', 'error'); return; }

  // Map group name → target deck id
  const groupTargetMap = {};
  for (const g of selectedGroups) groupTargetMap[g.name] = g.targetDid;

  await ensureDefaultDeck();
  const allDecks = await Deck.getAll();
  let added = 0;
  const totalToImport = cards.filter(c => groupTargetMap[c.deck || ''] !== undefined).length;
  showProgressModalImport(0, totalToImport);
  for (const c of cards) {
    const groupName = c.deck || '';
    const targetDid = groupTargetMap[groupName];
    if (targetDid === undefined) continue; // group not selected
    try {
      const deck = allDecks.find(d => d.id === targetDid);
      if (!deck) continue;
      const nid = await Note.create([c.front, c.back], c.tags, 0);
      await Card.create(nid, deck.id, 0);
      added++;
      updateProgress(added, totalToImport);
    } catch(e) { /* skip invalid cards */ }
  }
  closeModal();
  showToast(`已导入 ${added} 张卡片`, 'success');
  if (location.hash.startsWith('#browse')) renderBrowse();
  else if (location.hash.startsWith('#dashboard')) renderDashboard();
  window._importCards = null;
  window._importDeckGroups = null;
  window._importSelectedDecks = null;
};

// ===== Stats =====
async function renderStats() {
  const overview = await Stats.getOverview();
  const cards = await Card.getAll();
  const revlogs = await Revlog.getAll();

  let totalReviews = revlogs.length;
  let avgInterval = 0; let reviewCards = 0;
  for (const c of cards) {
    if (c.type===2) { avgInterval += c.ivl; reviewCards++; }
  }
  avgInterval = reviewCards > 0 ? Math.round(avgInterval / reviewCards) : 0;

  let heatmapDays = 30;
  const countMap = {};
  for (const r of revlogs) {
    const d = Math.floor(r.reviewTime / 86400000);
    countMap[d] = (countMap[d] || 0) + 1;
  }
  function heatColor(count, max) {
    if (count === 0 || max === 0) return 'bg-gray-100';
    const t = count / max;
    if (t <= 0.25) return 'bg-green-200';
    if (t <= 0.5) return 'bg-green-400';
    if (t <= 0.75) return 'bg-green-600';
    return 'bg-green-800';
  }
  window._heatmapData = countMap;
  window._renderHeatmap = function(days) {
    heatmapDays = days;
    const todayDay = Math.floor(Date.now() / 86400000);
    const today = new Date();
    const cols = days <= 7 ? days : Math.ceil(days / 7);
    let max = 0;
    for (let col = 0; col < cols; col++) {
      for (let row = 0; row < 7; row++) {
        const date = new Date(today);
        date.setDate(date.getDate() - (col * 7 + (6 - row)));
        const d = Math.floor(date.getTime() / 86400000);
        if (d > todayDay - days) max = Math.max(max, countMap[d] || 0);
      }
    }
    const dayNames = ['一','二','三','四','五','六','日'];
    let html = '';
    for (let row = 0; row < 7; row++) {
      let rowHTML = '';
      for (let col = cols - 1; col >= 0; col--) {
        const date = new Date(today);
        date.setDate(date.getDate() - (col * 7 + (6 - row)));
        const d = Math.floor(date.getTime() / 86400000);
        const count = countMap[d] || 0;
        const inRange = d > todayDay - days;
        const tooltip = inRange ? date.getMonth()+1+'/'+date.getDate()+' · '+count+'次' : '';
        rowHTML += '<div class="w-3.5 h-3.5 rounded-sm '+(inRange ? heatColor(count, max) : 'bg-transparent')+'" title="'+tooltip+'"></div>';
      }
      html += '<div class="flex items-center gap-0.5">'+(days > 7 ? '<span class="text-[10px] text-gray-400 w-5 text-right mr-1">'+dayNames[row]+'</span>' : '')+rowHTML+'</div>';
    }
    $('#heatmapContainer').innerHTML = html;
    $$('.hm-btn').forEach(function(b) {
      var v = parseInt(b.dataset.days);
      b.classList.toggle('bg-blue-500', v === days);
      b.classList.toggle('text-white', v === days);
      b.classList.toggle('bg-gray-100', v !== days);
      b.classList.toggle('text-gray-500', v !== days);
    });
  };

  const rangeOptions = [{label:'7天',v:7},{label:'30天',v:30},{label:'一年',v:365}].map(function(o) {
    return '<button data-days="'+o.v+'" onclick="window._renderHeatmap('+o.v+')" class="hm-btn px-3 py-1 text-xs rounded-lg '+(heatmapDays===o.v?'bg-blue-500 text-white':'bg-gray-100 text-gray-500')+' hover:bg-gray-200 transition-colors">'+o.label+'</button>';
  }).join('');

  $('#app').innerHTML = '<h2 class="text-xl font-bold text-gray-800 mb-4">统计</h2>' +
    '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">' +
      '<div class="bg-white rounded-xl shadow-sm p-4 text-center"><div class="text-2xl font-bold text-blue-500">' + overview.decks + '</div><div class="text-xs text-gray-400 mt-1">卡组</div></div>' +
      '<div class="bg-white rounded-xl shadow-sm p-4 text-center"><div class="text-2xl font-bold text-green-500">' + overview.cards + '</div><div class="text-xs text-gray-400 mt-1">卡片</div></div>' +
      '<div class="bg-white rounded-xl shadow-sm p-4 text-center"><div class="text-2xl font-bold text-orange-500">' + overview.due + '</div><div class="text-xs text-gray-400 mt-1">待复习</div></div>' +
      '<div class="bg-white rounded-xl shadow-sm p-4 text-center"><div class="text-2xl font-bold text-purple-500">' + totalReviews + '</div><div class="text-xs text-gray-400 mt-1">总复习数</div></div>' +
    '</div>' +
    '<div class="mb-4"><button onclick="clearAllData()" class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600 transition-colors">清除所有数据</button></div>' +
    '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">' +
      '<div class="bg-white rounded-xl shadow-sm p-5">' +
        '<div class="flex items-center justify-between mb-4">' +
          '<h3 class="text-sm font-medium text-gray-700">复习热度图</h3>' +
          '<div class="flex gap-1">' + rangeOptions + '</div>' +
        '</div>' +
        '<div id="heatmapContainer" class="flex flex-col gap-0.5"></div>' +
        '<div class="flex items-center gap-1 mt-3 text-[10px] text-gray-400 justify-end">' +
          '<span>少</span><div class="w-3 h-3 rounded-sm bg-gray-100"></div><div class="w-3 h-3 rounded-sm bg-green-200"></div><div class="w-3 h-3 rounded-sm bg-green-400"></div><div class="w-3 h-3 rounded-sm bg-green-600"></div><div class="w-3 h-3 rounded-sm bg-green-800"></div><span>多</span>' +
        '</div>' +
      '</div>' +
      '<div class="bg-white rounded-xl shadow-sm p-5">' +
        '<h3 class="text-sm font-medium text-gray-700 mb-4">概览</h3>' +
        '<div class="space-y-2 text-sm">' +
          '<div class="flex justify-between"><span class="text-gray-500">笔记数</span><span class="font-medium">' + overview.notes + '</span></div>' +
          '<div class="flex justify-between"><span class="text-gray-500">卡片数</span><span class="font-medium">' + overview.cards + '</span></div>' +
          '<div class="flex justify-between"><span class="text-gray-500">今日已复习</span><span class="font-medium">' + overview.todayReviews + '</span></div>' +
          '<div class="flex justify-between"><span class="text-gray-500">平均间隔</span><span class="font-medium">' + avgInterval + ' 天</span></div>' +
          '<div class="flex justify-between"><span class="text-gray-500">复习记录</span><span class="font-medium">' + totalReviews + '</span></div>' +
        '</div>' +
      '</div>' +
    '</div>';
  setTimeout(function() { window._renderHeatmap(heatmapDays); }, 0);
};

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', (e) => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  if (!location.hash.startsWith('#deck/')) return;
  if (reviewState.cards && reviewState.idx < reviewState.cards.length) {
    if (!reviewState.showingBack && (e.key===' '||e.key==='Enter')) { e.preventDefault(); flipCard(); }
    else if (reviewState.showingBack) {
      if (e.key==='1') answerCard('again');
      else if (e.key==='2') answerCard('hard');
      else if (e.key==='3') answerCard('good');
      else if (e.key==='4') answerCard('easy');
    }
  }
});

window.clearAllData = async function() {
  showConfirm('确定要清空所有数据吗？此操作不可恢复！', async () => {
    await clearAllDB();
    await ensureDefaultDeck();
    showToast('所有数据已清除', 'success');
    if (location.hash.startsWith('#stats')) renderStats();
    else if (location.hash.startsWith('#dashboard')) renderDashboard();
    else if (location.hash.startsWith('#browse')) renderBrowse();
  });
};

// ===== Context menu =====
let _ctxDeckId = null;

function showCtxMenu(event, did) {
  _ctxDeckId = did;
  const menu = $('#ctxMenu');
  menu.style.left = event.clientX + 'px';
  menu.style.top = event.clientY + 'px';
  menu.classList.remove('hidden');
}

function hideCtxMenu() {
  $('#ctxMenu').classList.add('hidden');
  _ctxDeckId = null;
}

function ctxAction() {
  const did = _ctxDeckId;
  hideCtxMenu();
  if (did === null) return;
  showConfirm('确定要清空此卡组的所有卡片吗？此操作不可恢复。', async () => {
    const cards = await Card.getByDeck(did);
    const nids = [...new Set(cards.map(c => c.nid))];
    showProgressModal(nids.length);
    for (let i = 0; i < nids.length; i++) {
      await Card.removeByNid(nids[i]);
      await Note.remove(nids[i]);
      updateProgress(i + 1, nids.length);
    }
    closeModal();
    showToast(`已清空 ${cards.length} 张卡片`, 'success');
    renderDashboard();
  });
}

function showProgressModalImport(current, total) {
  showModal(`
    <div class="text-center" style="min-width:280px">
      <h3 class="text-lg font-bold mb-4">正在导入卡片</h3>
      <div class="w-full bg-gray-200 rounded-full h-4 mb-2 overflow-hidden">
        <div id="progressFill" class="progress-bar h-4 rounded-full bg-green-500" style="width:0%"></div>
      </div>
      <p id="progressText" class="text-sm text-gray-500">0 / ${total}</p>
    </div>`);
}

function showProgressModal(current, total) {
  showModal(`
    <div class="text-center" style="min-width:280px">
      <h3 class="text-lg font-bold mb-4">正在清空卡片</h3>
      <div id="progressWrapper" class="w-full bg-gray-200 rounded-full h-4 mb-2 overflow-hidden">
        <div id="progressFill" class="progress-bar h-4 rounded-full bg-blue-500" style="width:0%"></div>
      </div>
      <p id="progressText" class="text-sm text-gray-500">0 / ${total}</p>
    </div>`);
}

function updateProgress(current, total) {
  const fill = $('#progressFill');
  const text = $('#progressText');
  if (fill) fill.style.width = Math.round((current / total) * 100) + '%';
  if (text) text.textContent = current + ' / ' + total;
}

// Close context menu on any click
document.addEventListener('click', (e) => {
  if (!e.target.closest('#ctxMenu')) hideCtxMenu();
});

document.addEventListener('contextmenu', (e) => {
  if (!e.target.closest('.deck-card')) hideCtxMenu();
});

// ===== Lightbox =====
function openLightbox(src) {
  $('#lightboxImg').src = src;
  $('#lightbox').classList.remove('hidden');
}
function closeLightbox() {
  $('#lightbox').classList.add('hidden');
  $('#lightboxImg').src = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});
document.addEventListener('click', (e) => {
  const img = e.target.closest('#reviewFrontContent img, #reviewBackContent img, #previewFront img, #previewBack img');
  if (img) { e.stopPropagation(); openLightbox(img.src); }
}, true);

// ===== Image event handlers =====
document.addEventListener('paste', async (e) => {
  const target = e.target.closest('textarea[name="front"], textarea[name="back"], #editFront, #editBack');
  if (!target) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (!file) continue;
      const dataUrl = await imageToDataURL(file);
      insertAtCursor(target, `<img src="${dataUrl}">`);
    }
  }
});

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.img-btn');
  if (!btn) return;
  const input = $('#imageInput');
  input._target = btn.dataset.target;
  input.click();
});

$('#imageInput').addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  const targetId = e.target._target;
  const target = document.getElementById(targetId) || document.querySelector(`[name="${targetId}"]`);
  if (!target) return;
  const dataUrl = await imageToDataURL(file);
  insertAtCursor(target, `<img src="${dataUrl}">`);
  e.target.value = '';
});

// ===== Init =====
async function init() {
  try {
    const r = await fetch('http://localhost:3456/api/data/ankiweb');
    if (!r.ok) throw new Error('服务器连接失败');
    await ensureDefaultDeck();
    navigate();
  } catch (e) {
    console.error('Init error:', e);
    $('#app').innerHTML = `<div class="text-center py-16">
      <div class="text-5xl mb-3">⚠️</div>
      <p class="text-sm font-medium text-red-500">服务器未启动</p>
      <p class="text-xs text-gray-400 mt-1 max-w-md mx-auto">请在项目目录下运行 <code class="bg-gray-100 px-1 rounded">node server.js</code> 启动服务器，然后刷新此页面。</p>
      <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600 transition-colors">重试</button>
    </div>`;
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
